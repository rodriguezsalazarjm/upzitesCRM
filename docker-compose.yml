services:
  crm-postgres:
    image: postgres:16-alpine
    container_name: upzites-crm-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: upzites_crm
      POSTGRES_USER: upzites
      POSTGRES_PASSWORD: upzites
    ports:
      - "5433:5432"
    volumes:
      - crm_postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U upzites -d upzites_crm"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  crm_postgres_data:
